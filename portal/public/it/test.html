function fuzzyMatch(target, candidates) {
    if (!target) return null;
    const t = String(target).toLowerCase().trim();
    for (const c of candidates) if (c.toLowerCase() === t) return c;
    for (const c of candidates) if (c.toLowerCase().includes(t) || t.includes(c.toLowerCase())) return c;
    const tWords = t.split(/[\s()\/]+/).filter(w => w.length > 1);
    for (const c of candidates) {
        const cLower = c.toLowerCase();
        for (const w of tWords) if (cLower.includes(w)) return c;
    }
    return null;
}

function heuristicExtract(history) {
    const all = history.map(m => m.content || '').join('\n');
    const userText = history.filter(m => m.role === 'user').map(m => m.content).join(' / ');
    let priority = '';
    if (/ด่วนมาก|ฉุกเฉิน|วิกฤต|urgent|งานหยุด|ทำงานไม่ได้เลย/i.test(all)) priority = 'urgent';
    else if (/\bด่วน\b|\bhigh\b|สำคัญ|ต้องใช้วันนี้/i.test(all)) priority = 'high';
    else if (/ปกติ|\bmedium\b|มีทางเลี่ยง|พอเลี่ยงได้/i.test(all)) priority = 'medium';
    else if (/ไม่เร่ง|\blow\b|ไม่รีบ/i.test(all)) priority = 'low';
    const locs = ['Comets HQ','Comets FAC','ICT','JA'];
    let location = '';
    for (const l of locs) if (all.includes(l)) { location = l; break; }
    let locationDetail = '';
    const ldMatch = userText.match(/(โต๊ะ[฀-๿\w ]{0,20}|ชั้น\s*\d+[฀-๿\w ]{0,20}|ห้อง\s*[฀-๿\w]{0,20})/);
    if (ldMatch) locationDetail = ldMatch[0].trim();
    if (!locationDetail) {
        const roomMatch = userText.match(/\b(?:PB)?\d{1,2}[A-Za-z]\d?\b/);
        if (roomMatch) locationDetail = roomMatch[0].trim();
    }
    let vncNumber = '';
    const vncMatch = userText.match(/\bvnc[:\s]*([0-9]{1,4})\b/i);
    if (vncMatch) vncNumber = vncMatch[1].trim();
    const skipPatterns = /^(ยืนยัน|ใช่|ตกลง|ok|okay|เปิด|เปิดเลย|จัดเลย|ข้าม|ไม่รู้|ไม่มี|ครับ|ค่ะ|ด่วน|ด่วนมาก|ไม่เร่ง|สำคัญ|ปกติ|urgent|high|medium|low)\s*ครับ?\s*$/i;
    const userMsgs = history
        .filter(m => m.role === 'user')
        .map(m => (m.content || '').trim())
        .filter(s => s && !skipPatterns.test(s));
    const request = userMsgs[0] || '';
    const haystack = (request + ' ' + all).toLowerCase();
    const guess = guessIssueFromText(haystack);
    return { request, priority, location, locationDetail, vncNumber, ...guess };
}

function guessIssueFromText(text) {
    const empty = { jobType:'', issueType:'', symptom:'' };
    if (!text) return empty;

    const PERM_JT = 'ขอสิทธิ์เข้าระบบ (ทำใบขอสิทธิ์)';

    // Hard hardware-failure pre-check
    const HARD_FAIL_RE = /จอฟ้า|หน้าจอฟ้า|blue\s*screen|bsod|หน้าจอคอม.*ดับ|คอม.*ดับ|คอมพังเสีย|คอมเสีย|คอมเปิดไม่ติด|คอมไม่บูต|เครื่องค้าง|เครื่องดับ|เครื่องเปิดไม่ติด|เครื่องพัง|รีสตาร์ทเอง|reboot.*เอง/i;
    if (HARD_FAIL_RE.test(text) && worklist['คอมพิวเตอร์'] && worklist['คอมพิวเตอร์']['PC']) {
        const pcSyms = worklist['คอมพิวเตอร์']['PC'] || [];
        let symptom = '';
        if (/หน้าจอฟ้า|จอฟ้า|blue\s*screen|bsod/i.test(text) && pcSyms.includes('หน้าจอฟ้า')) symptom='หน้าจอฟ้า';
        else if (/เปิดไม่ติด|ไม่บูต|ดับ/i.test(text) && pcSyms.includes('เครื่องเปิดไม่ติด')) symptom='เครื่องเปิดไม่ติด';
        else if (/ช้า/i.test(text) && pcSyms.includes('เครื่องช้า')) symptom='เครื่องช้า';
        return { jobType:'คอมพิวเตอร์', issueType:'PC', symptom };
    }

    const isRequest = /(ขอสิทธิ์|ขอใช้|ขอเข้า|ขอเพิ่ม|ขอลบ|ขอลง|ขอติดตั้ง|ขอ\s*permission|ขอเปลี่ยน|ขอยืม|ขอ\s*account|ขอ\s*setup|ขอ\s*install|ขอ\s*key|ขอ\s*license|อยาก(ใช้|ลง|ติดตั้ง|ขอ|ได้)|ช่วย(ลง|ติดตั้ง|เพิ่มสิทธิ์)|รบกวน(ขอ|ลง|ติดตั้ง)|ติดตั้งโปรแกรม|พนักงานใหม่|new\s*employee|new\s*account)/i.test(text);
    if (isRequest && worklist[PERM_JT]) {
        const REQ_RULES = [
            [/พนักงานใหม่|new\s*employee|onboard/i, 'พนักงานใหม่'],
            [/express/i, 'ขอสิทธิ์เข้าระบบ Express'],
            [/\bsap\b/i, 'ขอสิทธิ์เข้าระบบ SAP'],
            [/\bvpn\b/i, 'ขอใช้งาน VPN'],
            [/อีเมล|email|outlook/i, 'เปลี่ยนแปลงสิทธิ์ (Email)'],
            [/driveshare|ไฟล์กลาง|drive\s*share/i, 'เปลี่ยนแปลงสิทธิ์ (Driveshare)'],
            [/ปริ้น|printer|พริ้นต์|พริ้น/i, 'เปลี่ยนแปลงสิทธิ์ (ปริ้นเตอร์)'],

function validateDraftWorklist(draft) {
    const out = { jobType:'', issueType:'', symptom:'' };
    if (draft.symptom) {
        const sym = String(draft.symptom).trim();
        const matches = [];
        for (const [j, issues] of Object.entries(worklist)) {
            for (const [i, syms] of Object.entries(issues)) {
                if ((syms || []).some(s => s === sym)) matches.push({ j, i, sym });
            }
        }
        if (matches.length === 0) {
            for (const [j, issues] of Object.entries(worklist)) {
                for (const [i, syms] of Object.entries(issues)) {
                    const m = fuzzyMatch(sym, syms || []);
                    if (m) matches.push({ j, i, sym: m });
                }
            }
        }
        if (matches.length === 1) return { jobType:matches[0].j, issueType:matches[0].i, symptom:matches[0].sym };
        if (matches.length > 1) {
            const aiJt = fuzzyMatch(draft.jobType, Object.keys(worklist));
            const aiIt = aiJt ? fuzzyMatch(draft.issueType, Object.keys(worklist[aiJt] || {})) : '';
            const preferred = matches.find(m => m.j === aiJt && m.i === aiIt) || matches[0];
            return { jobType:preferred.j, issueType:preferred.i, symptom:preferred.sym };
        }
    }
    const jt = fuzzyMatch(draft.jobType, Object.keys(worklist));
    if (!jt) {
        const candidates = [];
        for (const [j, issues] of Object.entries(worklist)) {
            const i = fuzzyMatch(draft.issueType, Object.keys(issues));
            if (i) candidates.push({ j, i });
        }
        if (candidates.length === 1) {
            out.jobType = candidates[0].j;
            out.issueType = candidates[0].i;
            const syms = worklist[out.jobType][out.issueType] || [];
            out.symptom = fuzzyMatch(draft.symptom, syms) || '';
        }
        return out;
    }
    out.jobType = jt;
    const it = fuzzyMatch(draft.issueType, Object.keys(worklist[jt]));
    if (!it) return out;
    out.issueType = it;
    out.symptom = fuzzyMatch(draft.symptom, worklist[jt][it] || []) || '';
    return out;
}

// ===== Test runner =====
function runOneCase(input, expected, aiDraft) {
    // Simulate a chat history with just the user message (or, if AI run,
    // include AI response so heuristic sees full context).
    const history = [{ role:'user', content: input }];
    const heur = heuristicExtract(history);
    let aiOut = null, finalOut;
    if (aiDraft) {
        aiOut = aiDraft;
        // Mimic merge logic from offerTicketDraft
        const merged = { ...aiDraft };
        for (const k of Object.keys(heur)) {
            if (merged[k] === undefined || merged[k] === null || merged[k] === '') merged[k] = heur[k];
        }
        if (heur.jobType && heur.issueType
            && worklist[heur.jobType] && worklist[heur.jobType][heur.issueType]) {
            merged.jobType = heur.jobType;
            merged.issueType = heur.issueType;
        }
        finalOut = validateDraftWorklist(merged);
    } else {
        // Heuristic-only: validate directly
        finalOut = validateDraftWorklist({ jobType: heur.jobType, issueType: heur.issueType, symptom: heur.symptom });
    }
    const passed = finalOut.jobType === expected.jobType
        && (!expected.issueType || finalOut.issueType === expected.issueType)
        && (!expected.symptom || finalOut.symptom === expected.symptom);
    return { input, expected, heur, ai: aiOut, final: finalOut, passed };
}

        for (const jt of Object.keys(worklist)) {
            for (const it of Object.keys(worklist[jt] || {})) {
                worklistRows.push({ jobType: jt, issueType: it, symptom: (worklist[jt][it] || []).join(' | ') });
            }
        }
        const r = await fetch('/api/chat', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                messages:[{ role:'user', content: input }],
                action:'draft',
                worklist: worklistRows,
            }),
        });
        const data = await r.json();
        return data.draft || {};
    } catch (e) {
        return { _error: e.message };
    }
}

function fmtCell(o) {
    if (!o) return '<i style="color:#9CA3AF;">-</i>';
    const j = o.jobType || '<i style="color:#DC2626;">[ว่าง]</i>';
    const i = o.issueType || '<i style="color:#94A3B8;">-</i>';
    const s = o.symptom || '<i style="color:#94A3B8;">-</i>';
    return '<div class="field-row"><span class="field-label">jt:</span><span>' + j + '</span></div>'
         + '<div class="field-row"><span class="field-label">it:</span><span>' + i + '</span></div>'
         + '<div class="field-row"><span class="field-label">sym:</span><span>' + s + '</span></div>';
}

async function runAll(withAi) {
    document.getElementById('aiCol').style.display = withAi ? '' : 'none';
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    document.getElementById('results').style.display = '';
    document.getElementById('summary').style.display = '';
    document.getElementById('status').textContent = 'กำลังโหลด worklist...';
    if (Object.keys(worklist).length === 0) await loadWorklist();
    document.getElementById('status').textContent = withAi ? 'รัน AI ทุกเคส (อาจช้า ~30s+)...' : 'รัน heuristic...';
    let pass = 0, fail = 0;
    for (let i = 0; i < TEST_CASES.length; i++) {
        const tc = TEST_CASES[i];
        const aiDraft = withAi ? await callAiDraft(tc.input) : null;
        const result = runOneCase(tc.input, tc.expect, aiDraft);
        if (result.passed) pass++; else fail++;
        const tr = document.createElement('tr');
        tr.className = result.passed ? 'pass' : 'fail';
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td class="cell-input">${escHtml(tc.input)}</td>
            <td class="cell-expected">${fmtCell({ jobType: tc.expect.jobType, issueType: tc.expect.issueType, symptom: tc.expect.symptom })}</td>
            <td class="cell-actual">${fmtCell(result.heur)}</td>
            ${withAi ? `<td class="cell-actual">${fmtCell(result.ai)}</td>` : ''}
            <td class="cell-actual ${result.passed ? '' : 'fail'}">${fmtCell(result.final)}</td>
            <td><span class="status ${result.passed ? 'pass' : 'fail'}">${result.passed ? 'PASS' : 'FAIL'}</span></td>
        `;
        tbody.appendChild(tr);
        document.getElementById('pillTotal').textContent = `Total: ${i + 1}/${TEST_CASES.length}`;
        document.getElementById('pillPass').textContent  = `✅ Pass: ${pass}`;
        document.getElementById('pillFail').textContent  = `❌ Fail: ${fail}`;
    }
    document.getElementById('status').textContent = `เสร็จ ${pass}/${TEST_CASES.length} ผ่าน`;
}

function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('runHeur').addEventListener('click', () => runAll(false));
document.getElementById('runAi').addEventListener('click', () => runAll(true));
</script>
